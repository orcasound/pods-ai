---
name: Check CSV

on:
  pull_request:

concurrency:
  # Cancel any CI/CD workflow currently in progress for the same PR.
  # Allow running concurrently with any other commits.
  group: build-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  make_csv_ubuntu:
    if: github.actor != 'dependabot[bot]'
    permissions:
      actions: write  # for fkirc/skip-duplicate-actions to skip or stop workflow runs
      contents: read  # for actions/checkout to fetch code
    runs-on: ubuntu-latest
    env:
      COSMOS_KEY: ${{ secrets.COSMOS_KEY }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b  # v2.15.0
        with:
          egress-policy: audit

      - id: skip_check
        uses: fkirc/skip-duplicate-actions@f75f66ce1886f00957d99748a42c724f4330bdcf  # v5.3.1
        with:
          cancel_others: 'false'
          paths_ignore: '["**.md", ".github/workflows/**"]'

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        if: steps.skip_check.outputs.should_skip != 'true'
        with:
          submodules: 'recursive'

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        if: steps.skip_check.outputs.should_skip != 'true'
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        if: steps.skip_check.outputs.should_skip != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        if: steps.skip_check.outputs.should_skip != 'true'
        working-directory: ModelTraining
        run: pip install -r requirements.txt

      - name: Patch fastai_audio for Python 3.11+ compatibility
        if: steps.skip_check.outputs.should_skip != 'true'
        working-directory: ModelTraining
        run: bash patch_fastai_audio.sh

      - name: Make CSV
        if: steps.skip_check.outputs.should_skip != 'true'
        working-directory: ModelTraining
        run: |
          python src/make_csv.py

      - name: Verify there are no changes in detections.csv
        if: steps.skip_check.outputs.should_skip != 'true'
        run: |
          git diff --exit-code

      - name: Process humpback wavs
        if: steps.skip_check.outputs.should_skip != 'true'
        working-directory: ModelTraining
        run: |
          python src/process_humpback_wavs.py

      - name: Extract training samples
        if: steps.skip_check.outputs.should_skip != 'true'
        working-directory: ModelTraining
        run: |
          python src/extract_training_samples.py

      - name: Verify there are no changes in training_samples.csv
        if: steps.skip_check.outputs.should_skip != 'true'
        run: |
          git diff --exit-code

  make_csv_windows:
    if: github.actor != 'dependabot[bot]'
    permissions:
      actions: write  # for fkirc/skip-duplicate-actions to skip or stop workflow runs
      contents: read  # for actions/checkout to fetch code
    runs-on: windows-latest
    env:
      COSMOS_KEY: ${{ secrets.COSMOS_KEY }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b  # v2.15.0
        with:
          egress-policy: audit

      - id: skip_check
        uses: fkirc/skip-duplicate-actions@f75f66ce1886f00957d99748a42c724f4330bdcf  # v5.3.1
        with:
          cancel_others: 'false'
          paths_ignore: '["**.md", ".github/workflows/**"]'

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        if: steps.skip_check.outputs.should_skip != 'true'
        with:
          submodules: 'recursive'

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        if: steps.skip_check.outputs.should_skip != 'true'
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        if: steps.skip_check.outputs.should_skip != 'true'
        run: choco install ffmpeg -y

      - name: Install Python dependencies
        if: steps.skip_check.outputs.should_skip != 'true'
        working-directory: ModelTraining
        run: pip install -r requirements.txt

      - name: Patch fastai_audio for Python 3.11+ compatibility
        if: steps.skip_check.outputs.should_skip != 'true'
        working-directory: ModelTraining
        shell: cmd
        run: patch_fastai_audio.bat

      - name: Make CSV
        if: steps.skip_check.outputs.should_skip != 'true'
        working-directory: ModelTraining
        run: |
          python src/make_csv.py

      - name: Verify there are no changes in detections.csv
        if: steps.skip_check.outputs.should_skip != 'true'
        run: |
          git diff --exit-code

      - name: Process humpback wavs
        if: steps.skip_check.outputs.should_skip != 'true'
        working-directory: ModelTraining
        run: |
          python src/process_humpback_wavs.py

      - name: Extract training samples
        if: steps.skip_check.outputs.should_skip != 'true'
        working-directory: ModelTraining
        run: |
          python src/extract_training_samples.py

      - name: Verify there are no changes in training_samples.csv
        if: steps.skip_check.outputs.should_skip != 'true'
        run: |
          git diff --exit-code
