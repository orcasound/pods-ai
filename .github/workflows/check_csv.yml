---
name: Check CSV

on:
  pull_request:

concurrency:
  # Cancel any CI/CD workflow currently in progress for the same PR.
  # Allow running concurrently with any other commits.
  group: build-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  make_csv:
    permissions:
      actions: write  # for fkirc/skip-duplicate-actions to skip or stop workflow runs
      contents: read  # for actions/checkout to fetch code
    runs-on: ubuntu-latest
    env:
      COSMOS_KEY: ${{ secrets.COSMOS_KEY }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@20cf305ff2072d973412fa9b1e3a4f227bda3c76  # v2.14.0
        with:
          egress-policy: audit

      - id: skip_check
        uses: fkirc/skip-duplicate-actions@f75f66ce1886f00957d99748a42c724f4330bdcf  # v5.3.1
        with:
          cancel_others: 'false'
          paths_ignore: '["**.md"]'

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        if: steps.skip_check.outputs.should_skip != 'true'
        with:
          submodules: 'recursive'

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        if: steps.skip_check.outputs.should_skip != 'true'
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        if: steps.skip_check.outputs.should_skip != 'true'
        working-directory: ModelTraining
        run: pip install -r requirements.txt

      - name: Make CSV
        if: steps.skip_check.outputs.should_skip != 'true'
        working-directory: ModelTraining
        run: |
          python src/make_csv.py

      - name: Verify there are no changes in detections.csv
        if: steps.skip_check.outputs.should_skip != 'true'
        run: |
          git diff --exit-code

      - name: Extract training samples
        if: steps.skip_check.outputs.should_skip != 'true'
        working-directory: ModelTraining
        run: |
          python src/extract_training_samples.py

      - name: Verify there are no changes in training_samples.csv
        if: steps.skip_check.outputs.should_skip != 'true'
        run: |
          git diff --exit-code
