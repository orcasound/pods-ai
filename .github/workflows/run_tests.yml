---
name: Run Tests

on:
  pull_request:
    paths:
      - 'ModelTraining/output/csv/**'
      - 'ModelTraining/tests/**'
      - 'ModelTraining/src/**'
      - '.github/workflows/run_tests.yml'
  workflow_dispatch:

concurrency:
  # Cancel any CI/CD workflow currently in progress for the same PR.
  # Allow running concurrently with any other commits.
  group: tests-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  run_tests_ubuntu:
    if: github.actor != 'dependabot[bot]'
    permissions:
      actions: write  # for fkirc/skip-duplicate-actions to skip or stop workflow runs
      contents: read  # for actions/checkout to fetch code
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2.18.0
        with:
          egress-policy: audit

      - id: skip_check
        uses: fkirc/skip-duplicate-actions@f75f66ce1886f00957d99748a42c724f4330bdcf  # v5.3.1
        with:
          cancel_others: 'false'

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        if: steps.skip_check.outputs.should_skip != 'true'
        with:
          submodules: 'recursive'

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        if: steps.skip_check.outputs.should_skip != 'true'
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        if: steps.skip_check.outputs.should_skip != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        if: steps.skip_check.outputs.should_skip != 'true'
        working-directory: ModelTraining
        run: pip install -r requirements.txt

      - name: Patch fastai_audio for Python 3.11+ compatibility
        if: steps.skip_check.outputs.should_skip != 'true'
        working-directory: ModelTraining
        run: bash patch_fastai_audio.sh

      - name: Download WAV files
        if: steps.skip_check.outputs.should_skip != 'true'
        working-directory: ModelTraining
        run: |
          python src/download_wavs.py

      - name: Run unit tests
        if: steps.skip_check.outputs.should_skip != 'true'
        working-directory: ModelTraining
        run: |
          python -m pytest tests/ -v


  run_tests_windows:
    if: github.actor != 'dependabot[bot]'
    permissions:
      actions: write  # for fkirc/skip-duplicate-actions to skip or stop workflow runs
      contents: read  # for actions/checkout to fetch code
    runs-on: windows-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2.18.0
        with:
          egress-policy: audit

      - id: skip_check
        uses: fkirc/skip-duplicate-actions@f75f66ce1886f00957d99748a42c724f4330bdcf  # v5.3.1
        with:
          cancel_others: 'false'

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        if: steps.skip_check.outputs.should_skip != 'true'
        with:
          submodules: 'recursive'

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        if: steps.skip_check.outputs.should_skip != 'true'
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        if: steps.skip_check.outputs.should_skip != 'true'
        run: choco install ffmpeg -y

      - name: Install Python dependencies
        if: steps.skip_check.outputs.should_skip != 'true'
        working-directory: ModelTraining
        run: pip install -r requirements.txt

      - name: Patch fastai_audio for Python 3.11+ compatibility
        if: steps.skip_check.outputs.should_skip != 'true'
        working-directory: ModelTraining
        shell: cmd
        run: patch_fastai_audio.bat

      - name: Download WAV files
        if: steps.skip_check.outputs.should_skip != 'true'
        working-directory: ModelTraining
        run: |
          python src/download_wavs.py

      - name: Run unit tests
        if: steps.skip_check.outputs.should_skip != 'true'
        working-directory: ModelTraining
        run: |
          python -m pytest tests/ -v
